# Gemini CLI Policy Engine — per-call READ-ONLY policy for the gemini leg.
# Attached via `--policy <this file>` when the wrapper is run with
# `--sandbox read-only`. Allows read tools, denies mutation + shell tools.
# Used INSTEAD of `--approval-mode plan` (plan mode crashes the Node/V8 heap on
# heavy files — gemini-cli issues #11321 / #18331 / #26588). It is per-call, so
# the same leg still does code work under `--sandbox workspace-write`.
#
# Schema DOC-VERIFIED 2026-07-04 against geminicli.com/docs/reference/policy-engine
# (rule table: toolName / decision allow|deny / priority; highest priority wins,
# so the deny rules (200) override the allow rules (100)). `--policy` loads at
# the User tier (4) and REPLACES ~/.gemini/policies for this call; only an
# Admin-tier policy can outrank these denies (gemini-cli PR #18500).
# ⚠️ Live ENFORCEMENT still to be e2e-confirmed on an enterprise/Vertex/API-key
# tier (individual-tier auth is deprecated → IneligibleTierError): run one
# write-attempt under `--sandbox read-only` and confirm the write tool is denied.

# --- allow read tools ---
[[rule]]
toolName = "read_file"
decision = "allow"
priority = 100

[[rule]]
toolName = "read_many_files"
decision = "allow"
priority = 100

[[rule]]
toolName = "glob"
decision = "allow"
priority = 100

[[rule]]
toolName = "search_file_content"
decision = "allow"
priority = 100

[[rule]]
toolName = "list_directory"
decision = "allow"
priority = 100

# --- deny mutation + shell tools (higher priority) ---
[[rule]]
toolName = "write_file"
decision = "deny"
priority = 200

[[rule]]
toolName = "replace"
decision = "deny"
priority = 200

[[rule]]
toolName = "run_shell_command"
decision = "deny"
priority = 200

# --- defense-in-depth: deny MCP-server tools (read-only must not depend on
# headless ask_user->deny defaults for unlisted tools). Wildcard is DOCUMENTED:
# policy-engine reference — "mcp_*: Matches any tool from any MCP server"
# (geminicli.com/docs/reference/policy-engine, verified 2026-07-05). ---
[[rule]]
toolName = "mcp_*"
decision = "deny"
priority = 200
